<div *ngIf="data && data.length > 1" class="class-tabs dark-bg-gary2" #parent>
  <div #anchor class="anchor"></div>
  <div
    #item
    class="tab dark-hover flex items-center gap-1.5"
    [class.active]="activeIndex === i"
    *ngFor="let tab of data; let i = index"
    (click)="selectTab(i)"
  >
    <app-logo
      *ngIf="tab.icon"
      [src]="tab.icon"
      class="flex-center"
      [size]="16"
      [radius]="4"
      [name]="tab.title"
    />
    {{ tab.title }}
  </div>
</div>
